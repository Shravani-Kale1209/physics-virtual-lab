<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp 1: Planck's Constant | Virtual Lab</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="../../css/experiment.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4"> 
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">PICT Physics Virtual Lab</span>
            <a href="../../index.html" class="btn btn-outline-light btn-sm fw-bold">Home Page</a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark mb-0">Determination of Planck's Constant</h3>
            <p class="text-muted small">Using Light Emitting Diodes (LEDs)</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 p-3" id="circuit-card">
                    <h5 class="text-center mb-4 border-bottom pb-2">Experimental Setup</h5>

                    <div class="circuit-container">
                        <div class="main-wire-loop"></div>
                    
                        <div class="comp-box ammeter-pos">
                            <div class="meter-circle">
                                <span class="label">mA</span>
                                <span id="a-meter" class="value">0.00</span>
                            </div>
                        </div>
                    
                        <div class="comp-box resistor-pos">
                            <svg width="60" height="20" viewBox="0 0 60 20">
                                <polyline points="0,10 5,10 10,2 20,18 30,2 40,18 50,2 55,10 60,10"
                                          fill="none" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    
                        <div class="comp-box led-pos">
                            <div id="led-bulb"></div>
                        </div>
                    
                        <div class="voltmeter-branch">
                            <div class="v-wires">
                                <div class="meter-circle">
                                    <span class="label">V</span>
                                    <span id="v-meter" class="value">0.00</span>
                                </div>
                            </div>
                        </div>
                    
                        <div class="comp-box battery-pos">
                            <svg width="80" height="30" viewBox="0 0 80 30">
                                <!-- wire stubs -->
                                <line x1="0" y1="15" x2="18" y2="15" stroke="#333" stroke-width="2"/>
                                <line x1="62" y1="15" x2="80" y2="15" stroke="#333" stroke-width="2"/>
                                <!-- long plate -->
                                <line x1="18" y1="5" x2="18" y2="25" stroke="#333" stroke-width="3"/>
                                <!-- short plate -->
                                <line x1="26" y1="9" x2="26" y2="21" stroke="#333" stroke-width="3"/>
                                <!-- long plate -->
                                <line x1="36" y1="5" x2="36" y2="25" stroke="#333" stroke-width="3"/>
                                <!-- short plate -->
                                <line x1="44" y1="9" x2="44" y2="21" stroke="#333" stroke-width="3"/>
                                <!-- long plate -->
                                <line x1="54" y1="5" x2="54" y2="25" stroke="#333" stroke-width="3"/>
                                <!-- diagonal variable arrow -->
                                <line x1="10" y1="24" x2="70" y2="6" stroke="#333" stroke-width="1.5"/>
                                <polygon points="70,6 63,7 67,13" fill="#333"/>
                            </svg>
                        </div>
                    </div>

                    <div class="mt-5 p-3 bg-light rounded border">
                        <div class="row align-items-center">
                            <div class="col-md-5">
                                <label class="form-label small fw-bold">Select LED Color</label>
                                <select id="led-selector" class="form-select">
                                    <option value="650" data-knee="1.8" data-color="#ff0000">Red (650 nm)</option>
                                    <option value="525" data-knee="2.4" data-color="#00ff00">Green (525 nm)</option>
                                </select>
                            </div>
                            <div class="col-md-7">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label small fw-bold">Adjust Voltage</label>
                                    <span class="badge bg-dark" id="volt-label">0.00 V</span>
                                </div>
                                <input type="range" id="volt-slider" class="form-range" min="0" max="5" step="0.01"
                                    value="0">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 h-100 p-3">
                    <h5 class="fw-bold mb-3 text-center border-bottom pb-2">Observations</h5>
                    <div class="table-responsive" style="height: 300px;">
                        <table id="obs-table" class="table table-sm table-hover text-center align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Voltage (V)</th>
                                    <th>Current (mA)</th>
                                </tr>
                            </thead>
                            <tbody id="obs-body"></tbody>
                        </table>
                    </div>

                    <div class="d-grid gap-2 mt-3">
                        <button id="add-reading" class="btn btn-primary fw-bold">Record Reading</button>
                        <div class="row g-2">
                            <div class="col-6">
                                <button id="clear-data" class="btn btn-outline-danger btn-sm w-100">Clear Table</button>
                            </div>
                            <div class="col-6">
                                <button id="download-pdf"
                                    class="btn btn-danger btn-sm w-100 text-white fw-bold">Download PDF</button>
                            </div>
                        </div>
                        <button onclick="calculatePlanck()" class="btn btn-success btn-lg mt-2 fw-bold">Calculate
                            Planck's Constant</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 text-center">
                <div class="bg-white p-3 rounded shadow-sm border d-inline-block">
                    <h6 class="text-muted mb-2">The Energy Equation</h6>
                    <span class="fs-4">$$ eV_0 = \frac{hc}{\lambda} $$</span>
                    <small class="text-muted d-block mt-2">Where $h$ is Planck's constant and $c$ is speed of
                        light.</small>
                </div>
            </div>
        </div>
        <div id="calculation-output" class="mt-4 pb-5"></div>
    </div>

    <script src="simulation.js"></script>
</body>

</html>
