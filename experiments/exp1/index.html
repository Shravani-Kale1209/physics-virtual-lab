<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exp 1: Planck's Constant</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../css/experiment.css">

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../index.html">Home</a></li>
                <li class="breadcrumb-item active">Planck's Constant</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-7">
                <div class="simulation-box border p-4 bg-light rounded text-center">
                    <h4>Simulation Area</h4>

                    <div class="mb-3">
                        <label class="form-label">Select LED:</label>
                        <select id="led-selector" class="form-select">
                            <option value="650" data-knee="1.8" data-color="#ff0000">Red (650 nm)</option>
                            <option value="610" data-knee="2.0" data-color="#ffa500">Orange (610 nm)</option>
                            <option value="580" data-knee="2.1" data-color="#ffff00">Yellow (580 nm)</option>
                            <option value="525" data-knee="2.4" data-color="#00ff00">Green (525 nm)</option>
                        </select>
                    </div>

                    <div id="led-bulb" class="mx-auto my-4"></div>

                    <label class="form-label">Voltage Control (V)</label>
                    <input type="range" id="volt-slider" class="form-range" min="0" max="5" step="0.01" value="0">

                    <div class="d-flex justify-content-around mt-3">
                        <div class="p-2 border bg-dark text-success font-monospace rounded">V: <span
                                id="v-meter">0.00</span></div>
                        <div class="p-2 border bg-dark text-success font-monospace rounded">mA: <span
                                id="a-meter">0.00</span></div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <h5>Observations</h5>
                <div class="table-responsive" style="max-height: 300px;">
                    <table class="table table-sm table-striped border">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Volt (V)</th>
                                <th>Current (mA)</th>
                            </tr>
                        </thead>
                        <tbody id="obs-body"></tbody>
                    </table>
                </div>
                <button id="add-reading" class="btn btn-success w-100 mb-2">Record Reading</button>
                <button id="clear-data" class="btn btn-outline-danger w-100 mb-2">Clear Table</button>
                <button onclick="calculatePlanck()" class="btn btn-primary w-100">Calculate Planck's Constant</button>
            </div>
        </div>

        <div id="calculation-output" class="row mt-4"></div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="simulation.js"></script>
</body>

</html>
