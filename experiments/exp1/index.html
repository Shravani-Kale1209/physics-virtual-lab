<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp 1: Planck's Constant | Virtual Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../css/experiment.css">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="bg-light">
    <div id="navbar-placeholder"></div>

    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../../index.html">Home</a></li>
                <li class="breadcrumb-item active">Planck's Constant</li>
            </ol>
        </nav>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 text-center">
                        <h4 class="mb-4">Experimental Setup</h4>

                        <div class="circuit-container">
                            <div class="main-wire-loop"></div>
                        
                            <div class="comp-box ammeter-pos">
                                <div class="meter-circle">
                                    <span class="label">mA</span>
                                    <span id="a-meter" class="value">0.00</span>
                                </div>
                            </div>
                        
                            <div class="comp-box resistor-pos">
                                <div class="resistor-symbol"></div>
                            </div>
                        
                            <div class="comp-box led-pos">
                                <div id="led-bulb"></div>
                            </div>
                        
                            <div class="voltmeter-branch">
                                <div class="v-wire-l"></div>
                                <div class="v-wire-r"></div>
                                <div class="v-wire-b"></div>
                                <div class="meter-circle v-meter-unit">
                                    <span class="label">V</span>
                                    <span id="v-meter" class="value">0.00</span>
                                </div>
                            </div>
                        
                            <div class="comp-box battery-pos">
                                <div class="battery-symbol">
                                    <div class="bat-lines">
                                        <div class="b-line-l"></div>
                                        <div class="b-line-s"></div>
                                    </div>
                                    <div class="v-arrow"></div>
                                </div>
                            </div>                  </div>
                        <div class="mt-5 pt-3 border-top">
                            <div class="row align-items-center">
                                <div class="col-md-5">
                                    <select id="led-selector" class="form-select mb-3">
                                        <option value="650" data-knee="1.8" data-color="#ff0000">Red (650 nm)</option>
                                        <option value="610" data-knee="2.0" data-color="#ffa500">Orange (610 nm)
                                        </option>
                                        <option value="580" data-knee="2.1" data-color="#ffff00">Yellow (580 nm)
                                        </option>
                                        <option value="525" data-knee="2.4" data-color="#00ff00">Green (525 nm)</option>
                                    </select>
                                </div>
                                <div class="col-md-7">
                                    <div class="d-flex justify-content-between mb-2">
                                        <label class="form-label mb-0">Power Supply Voltage</label>
                                        <span class="badge bg-dark font-monospace" id="volt-label">0.00 V</span>
                                    </div>
                                    <input type="range" id="volt-slider" class="form-range" min="0" max="5" step="0.01"
                                        value="0">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <h5>Observations</h5>
                        <div class="table-responsive" style="max-height: 350px;">
                            <table class="table table-sm table-hover text-center">
                                <thead class="table-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>Voltage (V)</th>
                                        <th>Current (mA)</th>
                                    </tr>
                                </thead>
                                <tbody id="obs-body"></tbody>
                            </table>
                        </div>
                        <div class="d-grid gap-2 mt-3">
                            <button id="add-reading" class="btn btn-success">Record Reading</button>
                            <button id="clear-data" class="btn btn-outline-danger btn-sm">Clear Table</button>
                            <button onclick="calculatePlanck()" class="btn btn-primary btn-lg mt-2">Calculate Planck's
                                Constant</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="calculation-output" class="mt-4 pb-5"></div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="simulation.js"></script>
</body>

</html>
